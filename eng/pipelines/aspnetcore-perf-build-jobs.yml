    displayName: 'Build: Linux x64 (perf-build)'
    timeoutInMinutes: 180
    pool:
      name: $(DncEngInternalBuildPool)
      demands: ImageOverride -equals 1es-ubuntu-2204
    variables:
      _AspNetCoreRoot: $(Agent.BuildDirectory)/s/aspnetcore

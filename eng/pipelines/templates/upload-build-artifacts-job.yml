parameters:
  buildType: ''
  dependencyJobName: ''
  artifacts: []
  # repoName controls the {repoName} segment of the BCS blob path:
  #   builds/{repoName}/buildArtifacts/{sha}/{buildType}/{file}
  # Defaults to 'runtime' for back-compat with the existing runtime perf-build pipeline.
  # Callers building a different repo (e.g. dotnet/aspnetcore) pass repoName explicitly
  # so that the upload lands at a tenant-specific path the indexer/crank then read.
  repoName: 'runtime'
  # sha controls the {sha} segment of the BCS blob path:
  #   builds/{repoName}/buildArtifacts/{sha}/{buildType}/{file}
  # Defaults to the self repo's triggering commit ($(Build.SourceVersion)) for
  # back-compat with the runtime perf-build pipeline (hosted in dotnet/runtime,
  # so self == the repo being built). Callers where the built repo is a
  # *resource* rather than self (e.g. dotnet/aspnetcore perf-build hosted in
  # dotnet/performance) must pass the resource's commit explicitly, e.g.
  # sha: $(resources.repositories.aspnetcore.version), because Build.SourceVersion
  # would otherwise resolve to the performance pipeline commit.
  sha: '$(Build.SourceVersion)'

jobs:
- ${{ each artifact in parameters.artifacts }}:
  - job: UploadBuildArtifact_${{ artifact.artifactName }}
    displayName: 'Upload Build Artifact ${{ artifact.artifactName }}'
    condition: eq(stageDependencies.Build.${{ parameters.dependencyJobName }}.result, 'Succeeded')
    steps:
    - checkout: none
    - download: current
      displayName: Download Build Artifact ${{ artifact.artifactName }}
      artifact: ${{ artifact.artifactName }}
    - ${{ each fileName in artifact.files }}:
      - script: echo "pvscmdupload/\$web/builds/${{ parameters.repoName }}/buildArtifacts/${{ parameters.sha }}/${{ parameters.buildType }}/${{ fileName }}"
        displayName: 'Artifact upload path'
      - task: AzureCLI@2
        displayName: 'Upload ${{ fileName }} file'
        inputs:
          azureSubscription: '.NET Performance (790c4451-dad9-4fda-af8b-10bd9ca328fa)'
          scriptType: 'pscore'
          scriptLocation: 'inlineScript'
          inlineScript: |
            az storage blob upload --auth-mode login --account-name pvscmdupload --container-name '$web' --file "$(Pipeline.Workspace)/${{ artifact.artifactName }}/${{ fileName }}" --name "builds/${{ parameters.repoName }}/buildArtifacts/${{ parameters.sha }}/${{ parameters.buildType }}/${{ fileName }}" --overwrite true
